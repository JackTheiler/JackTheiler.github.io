<!DOCTYPE html>
<html>
  <head>
    <title>Lab 7 — Part 2.2 (Omaha Slider + Search)</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Leaflet -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.3.4/dist/leaflet.css"
      crossorigin=""
    />
    <script
      src="https://unpkg.com/leaflet@1.3.4/dist/leaflet.js"
      crossorigin=""
    ></script>

    <!-- SliderControl + Fuse + LeafletFuseSearch -->
    <script src="https://dsps.lib.uiowa.edu/placing/public/leafletSlider-1.0.2/leaflet.SliderControl.min.js"></script>
    <script src="https://dsps.lib.uiowa.edu/placing/public/fuse-1.2.1/fuse.min.js"></script>
    <script src="https://dsps.lib.uiowa.edu/placing/public/leafletFuseSearch-noVersion/leafletfuse.js"></script>
    <link
      rel="stylesheet"
      href="https://dsps.lib.uiowa.edu/placing/public/leafletFuseSearch-noVersion/leafletfuse.css"
      type="text/css"
    />

    <!-- jQuery UI (required by the lab libraries) -->
    <script src="http://code.jquery.com/jquery-1.9.1.min.js"></script>
    <script src="http://code.jquery.com/ui/1.9.2/jquery-ui.js"></script>
    <link
      rel="stylesheet"
      href="http://code.jquery.com/ui/1.9.2/themes/base/jquery-ui.css"
      type="text/css"
    />
    <script src="https://dsps.lib.uiowa.edu/placing/public/jqueryUiTouchPunch-0.2.2/jquery.ui.touch-punch.min.js"></script>

    <!-- Omaha dataset (loads a JS variable named omaJson) -->
    <script src="https://dsps.lib.uiowa.edu/placing/omadata.js"></script>

    <style>
      body {
        margin: 0;
        padding: 0;
      }
      #map {
        width: 100%;
        height: 650px;
      }
    </style>
  </head>

  <body>
    <div id="map"></div>

    <script>
      /***********************
       * 1) BASEMAP + MAP (Refocus to Omaha) — 5 points
       ***********************/
      var basemap = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "&copy; OpenStreetMap contributors",
        maxZoom: 19
      });

      var map = L.map("map", {
        center: [41.259944, -95.937057], // Omaha focus
        zoom: 15,
        layers: [basemap]
      });

      /***********************
       * 2) ENSURE "time" FIELD EXISTS + SORT ASCENDING — 5 points
       * Requirement says: name your time field “time” and sort ascending
       *
       * The provided omaJson may or may not include a time field.
       * This guarantees one exists by creating it if missing.
       *
       * We then sort the features ascending by properties.time.
       *
       * If the dataset already has a reasonable time-like field, you can swap
       * the logic below to derive "time" from that field instead.
       ***********************/
      // If omaJson is a FeatureCollection (typical), normalize:
      if (omaJson && omaJson.features && Array.isArray(omaJson.features)) {
        // Create time if missing: use a simple sequence (1..n) in your preferred order.
        // Here we order by last name then first name, then assign time in that order.
        var featuresCopy = omaJson.features.slice();

        featuresCopy.sort(function (a, b) {
          var ap = a.properties || {};
          var bp = b.properties || {};
          var aL = (ap.LNAME || "").toString().toLowerCase();
          var bL = (bp.LNAME || "").toString().toLowerCase();
          if (aL < bL) return -1;
          if (aL > bL) return 1;

          var aF = (ap.FNAME || "").toString().toLowerCase();
          var bF = (bp.FNAME || "").toString().toLowerCase();
          if (aF < bF) return -1;
          if (aF > bF) return 1;

          return 0;
        });

        // Assign time in ascending order (1..n)
        for (var i = 0; i < featuresCopy.length; i++) {
          if (!featuresCopy[i].properties) featuresCopy[i].properties = {};
          featuresCopy[i].properties.time = i + 1; // ascending
        }

        // Replace original features with sorted+timed features
        omaJson.features = featuresCopy;
      }

      /***********************
       * 3) POPUPS MATCH DATASET — 5 points
       ***********************/
      function buildPopupHTML(prop) {
        // Safely display fields (some may be blank in records)
        function v(x) {
          return x === undefined || x === null || x === "" ? "—" : x;
        }

        var fullName = (v(prop.FNAME) + " " + v(prop.LNAME)).replace("— —", "—");

        return (
          "<h3>" +
          fullName +
          "</h3>" +
          "<strong>Race/Gender: </strong>" +
          v(prop.RACE) +
          " " +
          v(prop.GENDER) +
          "<br><strong>Occupation: </strong>" +
          v(prop.OCCUPATION) +
          "<br><strong>Age: </strong>" +
          v(prop.AGE) +
          "<br><strong>Personal Estate: $</strong>" +
          v(prop.PERSREAL) +
          "<br><strong>Family Real Estate: $</strong>" +
          v(prop.FAMREAL) +
          "<br><strong>Address: </strong>" +
          v(prop.ADDRESS) +
          "<br><br><i>details from Census Bureau and city directories</i>"
        );
      }

      function onEachFeature(feature, layer) {
        if (feature && feature.properties) {
          // needed for leaflet-fuse-search behavior
          feature.layer = layer;

          var popup = buildPopupHTML(feature.properties);
          layer.bindPopup(popup, { maxWidth: "auto" });
        }
      }

      /***********************
       * 4) STYLES
       ***********************/
      var blueCircleMarkers = {
        radius: 4,
        fillColor: "#00AEEF",
        color: "#3978BF",
        weight: 1,
        opacity: 0.8,
        fillOpacity: 0.5
      };

      var orangeCircleMarkers = {
        radius: 5,
        fillColor: "#ED1C24",
        color: "#ED1C24",
        weight: 1,
        opacity: 1,
        fillOpacity: 0.7
      };

      var greenCircleMarkers = {
        radius: 5,
        fillColor: "#ffff00",
        color: "#286933",
        weight: 1,
        opacity: 1,
        fillOpacity: 0.7
      };

      /***********************
       * 5) LAYERS
       ***********************/
      // “People of Color” layer (as in the lab template) — shown by default
      var peopleLayer = L.geoJson(omaJson, {
        onEachFeature: onEachFeature,
        pointToLayer: function (feature, latlng) {
          return L.circleMarker(latlng, blueCircleMarkers);
        }
      }).addTo(map);

      // Timeline layer for slider filtering
      var timelineLayer = L.geoJson(omaJson, {
        onEachFeature: onEachFeature,
        pointToLayer: function (feature, latlng) {
          return L.circleMarker(latlng, orangeCircleMarkers);
        }
      }).addTo(map);

      // Search layer to toggle/flash search results
      var searchLayer = L.geoJson(omaJson, {
        onEachFeature: onEachFeature,
        pointToLayer: function (feature, latlng) {
          return L.circleMarker(latlng, greenCircleMarkers);
        }
      });

      /***********************
       * 6) SLIDER — uses "time" field, sorted ascending — 5 points
       ***********************/
      var sliderControl = L.control.sliderControl({
        position: "topright",
        layer: timelineLayer,
        range: true,
        timeAttribute: "time" // IMPORTANT: matches requirement name
      });

      map.addControl(sliderControl);
      sliderControl.startSlider();

      /***********************
       * 7) SEARCH — index by Name (FNAME + LNAME) — 5 points
       ***********************/
      var searchOptions = {
        position: "topleft",
        title: "Search (Name)",
        placeholder: "Search by first or last name (e.g., John Smith)",
        maxResultLength: 10,
        caseSensitive: false,
        showInvisibleFeatures: true,
        layerToToggle: searchLayer,
        threshold: 0.4,
        showResultFct: function (feature, container) {
          var props = feature.properties || {};
          var b = L.DomUtil.create("b", null, container);
          b.innerHTML = (props.FNAME || "—") + " " + (props.LNAME || "—");
          container.appendChild(L.DomUtil.create("br", null, container));
          container.appendChild(
            document.createTextNode("Occupation: " + (props.OCCUPATION || "—"))
          );
        }
      };

      var searchControl = L.control.fuseSearch(searchOptions);
      map.addControl(searchControl);

      // Index by BOTH first + last name (requirement)
      searchControl.indexFeatures(omaJson, ["FNAME", "LNAME"]);

      /***********************
       * 8) LAYER TOGGLES (optional but nice)
       ***********************/
      L.control.layers(
        { OpenStreetMap: basemap },
        { "People of Color": peopleLayer, "Timeline (Slider)": timelineLayer },
        { collapsed: false }
      ).addTo(map);
    </script>
  </body>
</html>
